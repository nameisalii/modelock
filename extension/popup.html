<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 360px;
      min-height: 420px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0b;
      color: #ececf0;
      -webkit-font-smoothing: antialiased;
    }

    .popup {
      display: flex;
      flex-direction: column;
      min-height: 420px;
    }

    .popup-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid #1e1e21;
    }

    .popup-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 15px;
    }

    .popup-logo-icon {
      width: 24px;
      height: 24px;
      border-radius: 5px;
      background: linear-gradient(135deg, #7c5cfc, #9b7dff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
    }

    .dashboard-link {
      font-size: 12px;
      color: #8e8e9a;
      text-decoration: none;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid #222225;
      transition: all 150ms;
    }

    .dashboard-link:hover {
      border-color: #333338;
      color: #ececf0;
    }

    .status-bar {
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #1e1e21;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.active {
      background: #34d399;
      box-shadow: 0 0 8px rgba(52, 211, 153, 0.4);
    }

    .status-dot.inactive {
      background: #44444e;
    }

    .status-text {
      font-size: 13px;
      font-weight: 500;
    }

    .status-badge {
      margin-left: auto;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 500;
    }

    .status-badge.active {
      background: rgba(52, 211, 153, 0.1);
      color: #34d399;
      border: 1px solid rgba(52, 211, 153, 0.15);
    }

    .status-badge.inactive {
      background: #1a1a1d;
      color: #5c5c68;
      border: 1px solid #222225;
    }

    .popup-body {
      flex: 1;
      padding: 16px 20px;
      overflow-y: auto;
    }

    .section-label {
      font-size: 10px;
      font-weight: 600;
      color: #5c5c68;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .modes-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .mode-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: #161618;
      border: 1px solid #222225;
      border-radius: 8px;
      cursor: pointer;
      transition: all 150ms;
    }

    .mode-item:hover {
      border-color: #333338;
      background: #1c1c1f;
    }

    .mode-item.active {
      border-color: rgba(124, 92, 252, 0.3);
      background: rgba(124, 92, 252, 0.05);
    }

    .mode-item-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .mode-item-name {
      font-size: 13px;
      font-weight: 500;
    }

    .mode-item-sites {
      font-size: 11px;
      color: #5c5c68;
    }

    .activate-btn {
      padding: 4px 14px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: all 150ms;
    }

    .activate-btn.activate {
      background: #7c5cfc;
      color: white;
    }

    .activate-btn.activate:hover {
      background: #6b4ef0;
    }

    .activate-btn.deactivate {
      background: rgba(248, 113, 113, 0.1);
      color: #f87171;
      border: 1px solid rgba(248, 113, 113, 0.15);
    }

    .activate-btn.deactivate:hover {
      background: rgba(248, 113, 113, 0.15);
    }

    .session-info {
      padding: 14px 20px;
      border-top: 1px solid #1e1e21;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .session-timer {
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
      color: #b09dff;
    }

    .session-blocked {
      font-size: 11px;
      color: #5c5c68;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #5c5c68;
    }

    .empty-state p {
      font-size: 13px;
      margin-bottom: 12px;
    }

    .empty-state a {
      font-size: 12px;
      color: #b09dff;
      text-decoration: none;
    }

    .login-section {
      text-align: center;
      padding: 60px 20px;
    }

    .login-section h3 {
      font-size: 16px;
      margin-bottom: 8px;
    }

    .login-section p {
      font-size: 13px;
      color: #8e8e9a;
      margin-bottom: 20px;
    }

    .login-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 24px;
      background: #7c5cfc;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 150ms;
    }

    .login-btn:hover {
      background: #6b4ef0;
    }
  </style>
</head>
<body>
  <div class="popup" id="popup">
    <!-- Header -->
    <div class="popup-header">
      <div class="popup-logo">
        <div class="popup-logo-icon">🔒</div>
        ModeLock
      </div>
      <a href="#" class="dashboard-link" id="dashboardLink">Dashboard →</a>
    </div>

    <!-- Content will be rendered by JS -->
    <div id="content"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
